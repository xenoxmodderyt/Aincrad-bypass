<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Aincrad Bypass</title>
  <style>
    body, html {
      margin: 0; padding: 0; height: 100%; overflow: hidden; background: #000; color: #fff;
      font-family: sans-serif;
    }
    iframe {
      width: 100%; height: 100%; border: none;
    }
    .loader {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      text-align: center; z-index: 100; display: none;
    }
    .loader.show { display: block; }
  </style>
</head>
<body>

  <div class="loader show" id="loader">
    <h2>Please wait...</h2>
    <p id="status">Loading target page...</p>
  </div>

  <iframe id="frame" sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-top-navigation"></iframe>

  <script>
    const target = "https://aincrad.decryptvpn.xyz/getkey";
    const iframe = document.getElementById('frame');
    const loader = document.getElementById('loader');
    const status = document.getElementById('status');

    iframe.src = target;

    iframe.onload = function() {
      loader.classList.remove('show');
      status.textContent = "Automation running...";

      try {
        const script = iframe.contentDocument.createElement('script');
        script.textContent = `
          (function() {
            console.log("%c[Aincrad Bypass] Injected by AhyaWife", "color:#ff00ff;font-size:16px");

            function findContinue() {
              const els = document.querySelectorAll('button, a, input[type="button"], [onclick], [role="button"]');
              for (let el of els) {
                const txt = (el.textContent || el.value || '').toLowerCase();
                if (txt.includes('continue') || txt.includes('proceed') || txt.includes('next') || txt.includes('get link')) {
                  el.click();
                  console.log("Continue button clicked automatically");
                  return true;
                }
              }
              return false;
            }

            function extractUrl() {
              const scripts = document.querySelectorAll('script');
              for (let s of scripts) {
                const t = s.textContent || '';
                if (t.length > 100) {
                  let match = t.match(/https?:\/\/[^"'\s)]+/);
                  if (match && match[0].length > 20 && !match[0].includes('decryptvpn')) {
                    return match[0];
                  }
                }
              }
              return null;
            }

            function run() {
              if (findContinue()) {
                setTimeout(run, 1800);
                return;
              }

              const dest = extractUrl();
              if (dest) {
                console.log("Destination found →", dest);
                window.location.replace(dest);
                return;
              }

              setTimeout(run, 1200);
            }

            // Start automation
            setTimeout(run, 1500);

            // Extra observer for dynamic content
            new MutationObserver(run).observe(document.documentElement, {childList: true, subtree: true});
          })();
        `;
        iframe.contentDocument.head.appendChild(script);
      } catch(e) {
        console.log("Iframe access blocked, falling back...");
        window.location.href = target;
      }
    };
  </script>
</body>
</html>
