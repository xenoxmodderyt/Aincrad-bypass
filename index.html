<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Aincrad Bypass</title>
  <style>
    /* same dark cyberpunk styling */
    body, html {
      margin: 0; padding: 0; height: 100%;
      background: linear-gradient(135deg, #0f0f0f, #1a0033);
      color: #fff; font-family: 'Segoe UI', sans-serif;
      display: flex; align-items: center; justify-content: center;
    }
    .card {
      background: rgba(0,0,0,0.7);
      padding: 40px; border-radius: 15px;
      border: 2px solid #ff00ff;
      text-align: center; max-width: 400px;
      box-shadow: 0 0 30px rgba(255,0,255,0.4);
    }
    h1 { color: #ff00ff; text-shadow: 0 0 15px #ff00ff; }
    .subtitle { color: #00ffcc; margin-bottom: 30px; }
    #bypassBtn {
      background: linear-gradient(45deg, #ff00ff, #00ffcc);
      border: none; padding: 15px 40px;
      font-size: 18px; font-weight: bold;
      color: #000; border-radius: 30px;
      cursor: pointer; transition: transform 0.2s;
    }
    #bypassBtn:active { transform: scale(0.95); }
    .info { margin-top: 20px; font-size: 13px; color: #aaa; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Aincrad Bypass</h1>
    <p class="subtitle">Auto Shortener & Link Unlocker</p>
    <button id="bypassBtn" onclick="launchBypass()">🔓 Start Bypass</button>
    <p class="info">Opens in secure WebView with auto-detection</p>
  </div>

  <script>
    function launchBypass() {
      // For Android WebView app: trigger native interface
      if (window.AndroidBridge && window.AndroidBridge.openWebView) {
        window.AndroidBridge.openWebView("https://aincrad.decryptvpn.xyz/getkey");
      } else {
        // Fallback for browser testing
        alert("This button works only inside the Aincrad Bypass app!");
      }
    }
  </script>
</body>
</html>
